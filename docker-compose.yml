services:
  worker:
    build:
      context: ../sentinelCam-worker
    ports:
      - "8080:8080"
      - "50000-51000:50000-51000/udp"
    environment:
      - WEB_AUTH_TOKEN=${WORKER_TOKEN}
      - WEB_ALLOWED_ORIGINS=http://localhost:3000,http://web:3000
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - WORKER_BASE_URL=http://worker:8080
      - WORKER_TOKEN=${WORKER_TOKEN}
      - WEB_PORT=3000
      - PUBLIC=1
      - INITIAL_ADMIN_USER=${ADMIN_USER:-admin}
      - INITIAL_ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - WEBAUTHN_RP_ID=localhost
    volumes:
      - web-data:/app/data
    depends_on:
      worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:3000/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  web-data:
